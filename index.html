<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenith Charm Roller</title>
    <link rel="icon" href="data:," />
    <script>
      window.__assetVersion = Date.now().toString();
      const stylesheet = document.createElement("link");
      stylesheet.rel = "stylesheet";
      stylesheet.href = `./src/styles.css?v=${window.__assetVersion}`;
      document.head.append(stylesheet);
    </script>
  </head>
  <body>
    <main class="page">
      <h1>Zenith Charm Roller</h1>
      <form id="roller-form" class="controls">
        <label>
          Rarity
          <select name="rarity" id="rarity">
            <option value="1">Common</option>
            <option value="2">Uncommon</option>
            <option value="3">Rare</option>
            <option value="4">Epic</option>
            <option value="5" selected>Legendary</option>
          </select>
        </label>

        <label>
          Candle
          <select name="tree" id="tree">
            <option value="">No</option>
          </select>
        </label>

        <button type="submit">Roll Charm</button>
      </form>

      <section id="result" class="result" aria-live="polite"></section>
      <button id="upgrade-button" type="button" disabled>Upgrade</button>
    </main>

    <script>
      const appScript = document.createElement("script");
      appScript.type = "module";
      appScript.src = `./src/app.js?v=${window.__assetVersion}`;
      document.body.append(appScript);
    </script>
  </body>
</html>
