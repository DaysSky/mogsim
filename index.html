<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Monumenta Zenith mog simulator"
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#1f1f1f" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zenith Charm Roller" />
    <meta
      property="og:description"
      content="Monumenta Zenith mog simulator"
    />
    <meta property="og:site_name" content="Zenith Charm Roller" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Zenith Charm Roller" />
    <meta
      name="twitter:description"
      content="Monumenta Zenith mog simulator"
    />
    <link rel="canonical" href="/" />
    <title>Zenith Charm Roller</title>
    <link rel="icon" href="data:," />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Zenith Charm Roller",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web Browser",
        "description": "Monumenta Zenith mog simulator"
      }
    </script>
    <script>
      window.__assetVersion = Date.now().toString();
      const stylesheet = document.createElement("link");
      stylesheet.rel = "stylesheet";
      stylesheet.href = `./src/styles.css?v=${window.__assetVersion}`;
      document.head.append(stylesheet);
    </script>
  </head>
  <body>
    <main class="page">
      <h1>Zenith Charm Roller</h1>
      <p class="sr-only">
        Roll Monumenta Zenith charms and inspect roll quality, budget usage, and
        upgrade previews.
      </p>
      <form id="roller-form" class="controls">
        <label>
          Rarity
          <select name="rarity" id="rarity">
            <option value="1">Common</option>
            <option value="2">Uncommon</option>
            <option value="3">Rare</option>
            <option value="4">Epic</option>
            <option value="5" selected>Legendary</option>
          </select>
        </label>

        <label>
          Candle
          <select name="tree" id="tree">
            <option value="">No</option>
          </select>
        </label>

        <button type="submit">Roll Charm</button>
      </form>
      <div id="roll-tools" class="roll-tools">
        <p id="roll-counter" class="roll-counter">Rolls: 0</p>
        <button
          id="reset-button"
          class="roll-reset-button"
          type="button"
        >
          Reset
        </button>
      </div>

      <section id="result" class="result" aria-live="polite"></section>
      <button id="upgrade-button" type="button" disabled>Upgrade</button>
    </main>

    <script>
      const appScript = document.createElement("script");
      appScript.type = "module";
      appScript.src = `./src/app.js?v=${window.__assetVersion}`;
      document.body.append(appScript);
    </script>
    <noscript>
      This tool requires JavaScript to roll and render charms.
    </noscript>
  </body>
</html>
